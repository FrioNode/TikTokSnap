<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - TikTokSnap</title>
  <link rel="stylesheet" href="app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
  <div class="wrap">
    <nav>
      <div class="logo">
        <div class="logo-icon"><i class="ti ti-brand-tiktok"></i></div>
        TikTokSnap
      </div>
      <div class="nav-links">
        <a href="/login.html" class="link-btn"><i class="ti ti-arrow-left"></i> Back to Login</a>
      </div>
        <button class="toggle" id="themeBtn" onclick="toggleTheme()">
          <i class="ti ti-moon" id="themeIcon"></i> <span id="themeLabel">Dark mode</span>
        </button>
    </nav>

    <div class="form-card" style="max-width:480px;margin:0 auto">
      <div style="text-align:center;margin-bottom:1.5rem">
        <div class="badge badge-accent" style="margin-bottom:1rem;display:inline-flex">
          <i class="ti ti-key"></i> Reset password
        </div>
        <h2 style="font-size:1.5rem;margin-bottom:0.5rem">Forgot password?</h2>
        <p style="color:var(--tx2);font-size:14px">Enter your email and we'll send you a reset link</p>
      </div>
      
      <div id="notice" class="notice hidden"></div>
      
      <form id="forgotPasswordForm">
        <div class="field">
          <label><i class="ti ti-mail"></i> Email address</label>
          <input type="email" name="email" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-actions" style="justify-content:center">
          <button type="submit" class="btn-primary" style="width:100%">
            <i class="ti ti-send"></i> Send reset link
          </button>
        </div>
        <div style="text-align:center;margin-top:1.5rem">
          <a href="/login.html" style="color:var(--tx2);font-size:13px;text-decoration:none">
            <i class="ti ti-arrow-back-up"></i> Remember your password? Sign in
          </a>
        </div>
      </form>
    </div>

    <footer class="footer">
      <div>Secure password reset — link expires in 1 hour</div>
      <div><a href="#">Need help?</a></div>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
