<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password - TikTokSnap</title>
  <link rel="stylesheet" href="app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
  <div class="wrap">
    <nav>
      <div class="logo">
        <div class="logo-icon"><i class="ti ti-brand-tiktok"></i></div>
        TikTokSnap
      </div>
      <div class="nav-links">
        <a href="/login.html" class="link-btn"><i class="ti ti-arrow-left"></i> Back to Login</a>
      </div>
     <button class="toggle" id="themeBtn" onclick="toggleTheme()">
          <i class="ti ti-moon" id="themeIcon"></i> <span id="themeLabel">Dark mode</span>
        </button>
    </nav>

    <div class="form-card" style="max-width:480px;margin:0 auto">
      <div style="text-align:center;margin-bottom:1.5rem">
        <div class="badge badge-green" style="margin-bottom:1rem;display:inline-flex">
          <i class="ti ti-lock"></i> Create new password
        </div>
        <h2 style="font-size:1.5rem;margin-bottom:0.5rem">Set new password</h2>
        <p style="color:var(--tx2);font-size:14px">Must be at least 8 characters</p>
      </div>
      
      <div id="notice" class="notice hidden"></div>
      
      <form id="setPasswordForm">
        <div class="field">
          <label><i class="ti ti-lock"></i> New password</label>
          <input type="password" name="new_password" required placeholder="••••••••" minlength="8" autocomplete="new-password">
        </div>
        <div class="field">
          <label><i class="ti ti-checkbox"></i> Confirm password</label>
          <input type="password" name="confirm_password" required placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="form-actions" style="justify-content:center">
          <button type="submit" class="btn-primary" style="width:100%">
            <i class="ti ti-device-floppy"></i> Reset password
          </button>
        </div>
      </form>
    </div>

    <footer class="footer">
      <div>Secure token expires in 1 hour</div>
      <div><a href="/forgot-password.html">Request new link</a></div>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
