<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login - TikTokSnap</title>
  <link rel="stylesheet" href="app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
  <div class="wrap">
    <nav>
      <div class="logo">
        <div class="logo-icon"><i class="ti ti-brand-tiktok" style="font-size:18px"></i></div>
        TikTokSnap
      </div>
      <div class="nav-links">
        <a href="/" class="link-btn">Home</a>
        <a href="/register.html" class="link-btn">Register</a>
        <button class="toggle" id="themeBtn" onclick="toggleTheme()">
          <i class="ti ti-moon" id="themeIcon"></i> <span id="themeLabel">Dark mode</span>
        </button>
      </div>
    </nav>

    <div class="form-card">
      <div class="top-bar"><div>
        <div class="page-title">Login</div>
        <p class="sub">Access your TikTok download dashboard and queue videos with your API key.</p>
      </div></div>
      <div id="notice" class="notice hidden"></div>
      <form id="loginForm">
        <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="email" required></div>
        <div class="field"><label for="password">Password</label><input id="password" name="password" type="password" autocomplete="current-password" required></div>
        <div class="form-actions">
          <button class="btn-primary" type="submit">Login</button>
          <a class="btn-secondary" href="/register.html">Create account</a>
        </div>
      </form>
    </div>

    <footer class="footer"><div>Need an account?</div><div><a href="/register.html">Register now</a></div></footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
